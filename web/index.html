    @import "open-props/style";

    /* optional imports that use the props */

    * {
      box-sizing: border-box;
    }

    html, body { height: 100%; }

    .column {
      display: grid;
      grid-template-columns: minmax(1rem, 1fr) minmax(auto, 72ch) minmax(1rem, 1fr);
      grid-gap: 1rem;
      height: 100%;
    }

    .chat-btn {
      display: flex;
      gap: 0.5rem;
      align-items: stretch;

      & > input {
        flex: 1;
      }
    }

    .chat-grid {
      display: grid;
      gap: 20px;
      grid-template-rows: 1fr minmax(auto, 44px);
      padding-block: 20px;
      overflow-y: scroll;
    }

    .chat-input {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .chat-messages {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      width: 100%;
      gap: 20px;
      overflow-y: scroll;
      scroll-timeline-name: --grid-scroll;
      scroll-timeline-axis: block;
    }

    .scrolled {
      padding: 16px;
    }

    @keyframes adjust-margin {
      from { margin-inline-end: 0px; }
      to {
        margin-inline-end: 16px;
      }
    }

    .chat-message {
      width: 100%;
    }

    .chat-bubble {
      background-color: var(--gray-8);
      border-radius: 8px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      width: fit-content;
      padding-inline: 20px;

      animation: adjust-margin ease-in-out forwards;
      animation-timeline: --grid-scroll;
      animation-range: 0px 100px;

      & time {
        font-size: .75rem;
        color: var(--gray-4);
      }
    }

    p:not(:first-child) {
      padding-block-start: .5rem;
    }

    p+p {
      padding-block: 16px;
    }

    [data-scrolled] {
      /* transition: padding 120ms ease-in-out; */
      animation: adjust-margin ease-in-out;
      animation-timeline: scroll(self);
    }

  <script type="module">
    const buttonEl = document.querySelector('.chat-btn button');
    const inputEl = document.querySelector('.chat-btn input');
    const messagesEl = document.querySelector('.chat-messages');

    let history = [];
    let isProcessing = false; // Lock flag

    // SSE Parser
    async function* parseSSE(response) {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      
      try {
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          buffer += decoder.decode(value, { stream: true });
          const messages = buffer.split('\n\n');
          buffer = messages.pop() || '';
          
          for (const message of messages) {
            if (message.startsWith('data: ')) {
              const data = message.slice(6);
              try {
                yield JSON.parse(data);
              } catch (e) {
                console.error('Parse error:', e);
              }
            }
          }
        }
      } finally {
        reader.releaseLock();
      }
    }

    buttonEl.addEventListener('click', async () => {
      const input = inputEl.value.trim();
      if (!input || isProcessing) return; // Check lock

      // Acquire lock
      isProcessing = true;
      buttonEl.disabled = true;
      inputEl.disabled = true;

      // Display user's message first
      const userMessage = document.createElement('div');
      userMessage.classList.add('chat-bubble');
      const userContentEl = document.createElement('div');
      userContentEl.classList.add('chat-message__content');
      userContentEl.textContent = input;
      userMessage.appendChild(userContentEl);
      messagesEl.appendChild(userMessage);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const response = await fetch('/api/hello', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input, history })
        });

        // Display assistant's message
        const message = document.createElement('div');
        message.classList.add('chat-message');
        const messageContentEl = document.createElement('div');
        messageContentEl.classList.add('chat-message__content');
        message.appendChild(messageContentEl);
        messagesEl.appendChild(message);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        
        let fullText = '';
        for await (const data of parseSSE(response)) {
          if (data.chunk) {
            console.log('Received chunk:', JSON.stringify(data.chunk));
            fullText += data.chunk;
            messageContentEl.textContent = fullText;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }

          if (data.done && data.history) {
            // Update local history AFTER stream completes
            history = data.history;
            console.log('History updated:', JSON.stringify(history, null, 2));
          }
        }
      } catch (error) {
        console.error('Request failed:', error);
      } finally {
        // Release lock
        isProcessing = false;
        buttonEl.disabled = false;
        inputEl.disabled = false;
        inputEl.value = '';
        inputEl.focus();
      }
    });

    // Also handle Enter key
    inputEl.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        buttonEl.click();
      }
    });
  </script>
